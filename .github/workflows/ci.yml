name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: msstate-policies
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: msstate-policies/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: dist/ must be in sync with src/
        run: git diff --exit-code dist/

      - name: Test
        run: npm test

      - name: tools/list smoke test (must list exactly 5 tools)
        run: |
          PAYLOAD='{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}'
          COUNT=$(printf '%s\n' "$PAYLOAD" | node dist/index.js | head -n1 | jq -r '.result.tools | length')
          echo "tool count = $COUNT"
          test "$COUNT" = "5"

      # N6: gate every push/PR on the mechanical security checklist + npm audit
      # so regressions surface in CI rather than at the next manual release.
      - name: msstate-policies npm audit (high+critical)
        run: npm audit --audit-level=high

      - name: worker npm audit (high+critical)
        working-directory: ../worker
        run: |
          if [ -f package-lock.json ]; then
            npm audit --audit-level=high
          else
            echo "skipping worker audit: no package-lock.json"
          fi

      - name: security-checklist gate (must score >= 100)
        working-directory: ..
        run: |
          score=$(bash tools/security-checklist.sh 2>/tmp/checklist.log | tail -1)
          cat /tmp/checklist.log
          echo "score=$score"
          if ! [[ "$score" =~ ^[0-9]+$ ]]; then
            echo "ERROR: checklist did not output a numeric score"
            exit 1
          fi
          if [ "$score" -lt 100 ]; then
            echo "ERROR: security checklist regressed below 100 (now $score)"
            exit 1
          fi
